# unbind C-b
# set -g prefix M-a
# bind M-a send-prefix

# Key bindings
bind-key x kill-pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
unbind -T root \\
bind \\ split-window -h
bind - split-window -v -l 25% -c "#{pane_current_path}"

# Mouse and terminal
set -g mouse on
set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",xterm-256color:Tc"
set-option -sa terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Synchronized output (DECSET 2026) — fixes Claude Code flicker in Ghostty
set -as terminal-features ',xterm-ghostty:sync,RGB'
set -as terminal-features ',tmux-256color:sync,RGB'

# Performance
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

# Window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g renumber-windows on
set -g set-titles on

# Display times
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 1

# Activity
set -g monitor-activity on
set -g visual-activity off

# Status bar common settings
set -g status-position bottom
set -g status-justify left
set -g status-left ''
setw -g window-status-bell-style 'fg=#FFFBEF bg=#F85552 bold'
setw -g window-status-separator ''
set -g status-right-length 150

# vi mode
set-window-option -g mode-keys vi
bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Read theme mode from ~/.theme-mode (set by `theme` shell command)
# Theme selection based on ~/.theme-mode file
if-shell '[ -f "$HOME/.theme-mode" ] && [ "$(cat "$HOME/.theme-mode" | tr -d "[:space:]")" = "dark" ]' {
  # Cursor accent (monokai yellow for dark; matches borders)
  set -g cursor-colour '#ffd866'
  # Monokai Pro Theme (yellow accent #ffd866)
  set -g pane-border-style 'fg=#5b595c'
  set -g pane-active-border-style 'fg=#ffd866'

  set -g status-style 'fg=#fcfcfa bg=#2d2a2e'
  set -g status-left ''
  set -g status-right '#[fg=#ffd866,bg=#403e41,bold] #{s/presentation-backend/pb/:#{s|/src/|/|:#{s|local_modules/||:@current_file}}} '

  setw -g window-status-format '#[fg=#727072,bg=#2d2a2e,bold] #I:#W ┃'
  setw -g window-status-current-format '#[fg=#2d2a2e,bg=#ffd866,bold] #I:#W '

  set-option -g display-panes-active-colour '#ffd866'
  set-option -g message-style 'fg=#fcfcfa bg=#403e41'
} {
  # Light theme
  # Cursor accent (magenta for light)
  set -g cursor-colour '#bf68d9'
  set-option -g display-panes-active-colour '#93B259'
  set-option -g message-style 'fg=#5C6A72 bg=#FEF2D5'
  set -g pane-border-style 'fg=#939F91'
  set -g pane-active-border-style 'fg=#93B259'
  
  set -g status-style 'fg=#5C6A72 bg=#EFEBD4'
  set -g status-left ''
  
  setw -g window-status-format '#[fg=#808080,bg=#f4f0D9,bold] #I:#W ┃'
  setw -g window-status-current-format '#[fg=#ffffff,bg=#93B259,bold] #I:#W '
  set -g status-right '#[fg=#829181,bg=#E6E2CC,bold] #{s/presentation-backend/pb/:#{s|/src/|/|:#{s|local_modules/||:@current_file}}} '
  
  set-option -g display-panes-active-colour '#93B259'
  set-option -g message-style 'fg=#5C6A72 bg=#FEF2D5'
}
